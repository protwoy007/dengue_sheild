publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  http: ^1.2.0
  provider: ^6.1.2
  google_fonts: ^6.2.1
  fl_chart: ^0.66.2
